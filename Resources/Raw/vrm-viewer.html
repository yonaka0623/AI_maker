<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      overflow: hidden;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #status {
      position: absolute;
      top: 8px;
      left: 8px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 11px;
      font-family: sans-serif;
    }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>
  <div id="status">Initializing...</div>

  <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.js"
  }
}
</script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');

    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
    camera.position.set(0, 1.4, 2.5);

    const controls = new OrbitControls(camera, canvas);
    controls.target.set(0, 1.2, 0);
    controls.enableDamping = true;
    controls.enableZoom = true;
    controls.minDistance = 1;
    controls.maxDistance = 5;
    controls.update();

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(1, 2, 1);
    scene.add(dirLight);

    let currentVrm = null;
    const clock = new THREE.Clock();

    const VRM_EXPRESSIONS = ['happy', 'sad', 'angry', 'surprised', 'neutral', 'relaxed'];
    const EMOTION_MAP = { joy: 'happy' };

    function setStatus(msg) {
      status.textContent = msg;
    }

    function notify(message) {
      // Communicate back to C# via URL interception
      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = 'app://callback?' + encodeURIComponent(message);
      document.body.appendChild(iframe);
      setTimeout(() => iframe.remove(), 100);
    }

    window.loadVRM = async function (url) {
      setStatus('Loading...');

      if (currentVrm) {
        scene.remove(currentVrm.scene);
        VRMUtils.deepDispose(currentVrm.scene);
        currentVrm = null;
      }

      const loader = new GLTFLoader();
      loader.register(parser => new VRMLoaderPlugin(parser));

      try {
        const gltf = await loader.loadAsync(url, (progress) => {
          const pct = Math.round(progress.loaded / progress.total * 100);
          setStatus(`Loading ${pct}%`);
        });
        currentVrm = gltf.userData.vrm;
        VRMUtils.rotateVRM0(currentVrm);
        scene.add(currentVrm.scene);
        setStatus('');
        notify('vrm_loaded');
      } catch (err) {
        setStatus('Error: ' + err.message);
        notify('vrm_error:' + encodeURIComponent(err.message));
      }
    };

    window.setExpression = function (emotion) {
      if (!currentVrm?.expressionManager) return;

      const mapped = EMOTION_MAP[emotion] || emotion;

      VRM_EXPRESSIONS.forEach(name => {
        try { currentVrm.expressionManager.setValue(name, 0); } catch { }
      });

      if (mapped !== 'neutral') {
        try { currentVrm.expressionManager.setValue(mapped, 1.0); } catch { }
      }
    };

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      if (currentVrm) currentVrm.update(delta);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();
    document.addEventListener('DOMContentLoaded', () => {
      setStatus('Ready');
      notify('vrm_loaded');
    });
  </script>
</body>

</html>
